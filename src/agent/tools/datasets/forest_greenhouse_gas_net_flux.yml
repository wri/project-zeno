prompt_instructions: 'DO NOT show trends over time or annual values. Caution users that this data shows net flux, gross emissions
  and removals as total values over the model period of 2001-2025, not an annual values. Show net flux as a split bar chart,
  with emissions in the positive y-axis and removals in the negative. The data is valid only 30% or higher canopy cover densities.
  Use the term "net sink" for net-negative flux values (removals/sequestration) and "net source" for net-positive (emissions)

  '
selection_hints: 'Shows net greenhouse gas flux from forests — balance between emissions and removals. Total over model period
  2001-2025, NOT annual values or timeseries. Negative values = net carbon sink; positive values = net GHG source. Uses 30%
  canopy density threshold (cannot be changed). For annual tree cover loss or emissions timeseries, use Tree Cover Loss dataset.

  '
code_instructions: 'CHART TYPES: - Net flux → split/diverging bar chart (emissions positive y-axis, removals negative) DATA
  RULES: - Values are TOTALS over model period 2001-2025 — present them as totals, NOT annual values - Do NOT divide by 25
  in code — keep the raw period totals - Do NOT pre-calculate or present annual averages - 30% canopy density threshold (fixed,
  cannot be changed) - Units: MgCO2e (tonnes of CO2 equivalent) DO/DON''T: - DO NOT show trends over time or annual values
  — this is a single-period aggregate - DO NOT attempt timeseries charts - Use "net sink" for net-negative flux (removals
  > emissions) - Use "net source" for net-positive flux (emissions > removals)

  '
presentation_instructions: 'Clarify that values represent total flux over 2001-2025, not annual figures. Mention that users
  can divide by 25 to estimate an annual average, but DO NOT perform this division — always present the raw totals as primary
  values. Use "net sink" for negative values, "net source" for positive values. Note the 30% canopy density threshold is fixed.
  This is a modeled product with inherent uncertainty — higher in removals than emissions.

  '
description: 'Maps the balance between emissions from forest disturbances and carbon removals from forest growth between 2001
  and 2025, using a globally consistent model. Negative values indicate forest areas acting as net carbon sinks, while positive
  values show net greenhouse gas sources. This dataset supports climate reporting, forest-based mitigation strategies, and
  greenhouse gas inventories by identifying where forests are contributing to or helping mitigate climate change. There is
  no timeseries; values are annual averages.

  '
methodology: 'This net flux layer is part of the forest greenhouse gas flux model described in Harris et al. (2021). This
  paper introduces a geospatial monitoring framework for estimating global forest fluxes which can assist a variety of actors
  and organizations with tracking greenhouse gas (GHG) fluxes from forests and in decreasing emissions or increasing removals
  by forests. Net forest flux represents the exchange of GHGs between forests and the atmosphere, calculated as the difference
  between GHGs emitted by forests and carbon removed by (or sequestered by) forests during the model period. Net carbon flux
  is calculated by subtracting average gross removals from annual gross emissions in each forested pixel; negative values
  are where forests were net sinks of carbon and positive values are where forests were net sources of GHGs between 2001 and
  2025. Net fluxes are calculated following IPCC Guidelines for national greenhouse gas inventories in each pixel where forests
  existed in 2000 or were established between 2000 and 2020 according to Potapov et al. 2022. This layer reflects the cumulative
  net flux during the model period (2001-2025) and must be divided by 25 to obtain average annual net flux; net flux values
  cannot be assigned to individual years of the model. All input layers were resampled to a common resolution of 0.00025 x
  0.00025 degrees each to match Hansen et al. (2013). We have made several updates to the model since its original release.
  For documentation through the current version, please refer to this blog. For a more detailed description of the changes
  included through the 2023 tree cover loss launch (released spring 2025) and a comparison of the model''s fluxes with those
  from the Global Carbon Budget and national greenhouse gas inventories, please refer to Gibbs et al. (2025). Net flux is
  available for download in two different area units over the model duration: 1) megagrams of CO2e emissions/ha, and 2) megagrams
  of CO2e emissions/pixel. The first is appropriate for visualizing (mapping) net flux because it represents the density of
  GHG fluxes per hectare. The second is appropriate for calculating the net flux in an area of interest (AOI) because the
  values of the pixels in the AOI can be summed to obtain the total net flux for that area. The values in the latter were
  calculated by adjusting the net flux per hectare by the size of each pixel, which varies by latitude. When estimating net
  flux occurring over a defined number of years between 2001 and 2025, divide the values by the model duration and then multiply
  by the number of years n the period of interest. Both datasets only include pixels within forests, as defined in the methods
  of Harris et al. (2021) and updated with tree cover gain through 2020.

  '
cautions: 'Data are the product of modeling and thus have an inherent degree of error and uncertainty. Users are strongly
  encouraged to read and fully comprehend the metadata and other availabledocumentation prior to data use. Net flux reflects
  the total over the model period of 2001-2025, not an annual time series from which a trend can be derived. Thus, values
  must be divided by 25 to calculate average annual net flux. Uncertainty is higher in gross removals than emissions, particularly
  driven by uncertainty in removal factors. These uncertainties are propagated to the uncertainty in net flux. Values are
  applicable to forest areas only (canopy cover >30 percent and >5 m height or areas with tree cover gain). See Harris et
  al. (2021) for further information on the forest definition used in the analysis. Emissions reflect stand-replacing disturbances
  as observed in Landsat satellite imagery and do not include emissions from unobserved forest degradation. Activity data
  used as the basis of the estimates contain temporal inconsistencies: Removals data contain temporal inconsistencies because
  tree cover gain represents a cumulative total from 2000-2020, rather than annual gains as estimated through 2025. Improvements
  in the detection of tree cover loss due to the incorporation of new satellite data and methodology changes between 2011
  and 2015 may result in higher estimates of emissions in recent years compared to earlier years. Refer here for additional
  information. Large jumps in net flux along some boundary are due to the use of ecozone-specific removal factors. The changes
  in net flux occur at ecozone boundaries, where different removal factors are applied on each side. This dataset has been
  updated since its original publication. See Overview for more information.

  '
function_usage_notes: 'Displays the net flux of greenhouse gases from forests, calculated as the difference between gross
  forest greenhouse gas emissions from stand-replacing forest disturbances and gross carbon removals from forest growth.

  '
