prompt_instructions: 'Natural/semi-natural grassland extent and change for each year from 2000 to 2022. Quantify area of natural/semi-natural
  grasslands in a given year. Quantify gains and losses in area of natural/semi-natural grasslands through time. Use bar or
  line charts to show total area of natural/semi-natural grasslands over time where the x axis is years and the y axis is
  hectares. Use pie chart to visualize natural/semi-natural grassland extent across different continents, countries, and administrative
  units in cases where user is requesting comparison among 8 or fewer geographic units. Use a table if user is requesting
  comparison among 9 or more geographic units. Exclude rows where area in a given year is 0 or missing. Gain in natural/semi-natural
  grassland can mean any of the following: restoration, regeneration, land abandonment, early successional stages, regrowth
  may be dominated by invasive species or woody plant encroachment, temporary states rather than restored ecosystems. Loss
  from natural/semi-natural grasslands can mean any of the following: permanent (or semi-permanent) transition to another
  land cover or land use, natural vegetation dynamics, such as regrowth following disturbance, natural seasonal or interannual
  variability, such as floodplain inundation, for example.

  '
selection_hints: 'Best dataset for natural/semi-natural grassland extent and change (2000-2022). Annual data at 30m resolution,
  measured in hectares. Covers grasslands, shrublands, and savannas (low vegetation <3m, ≥30% cover). NOT for cultivated grasslands,
  croplands, or open shrublands — use Global Land Cover for those. Can quantify area in a single year or track gains/losses
  over time.

  '
code_instructions: "CHART TYPES: - Area over time → bar chart or line chart (x=year, y=area_ha) - Comparison across ≤8 geographic\
  \ units → pie chart - Comparison across ≥9 geographic units → table DATA RULES: - Exclude rows where area_ha = 0 or missing\
  \ - All areas in hectares (ha) DO/DON'T: - Gain does NOT equal restoration — may be land abandonment, invasive species,\n\
  \  woody encroachment, or temporary regrowth\n- Loss does NOT equal permanent conversion — may be natural dynamics, seasonal\n\
  \  variability, or floodplain inundation\n- Do NOT use this for cultivated grasslands or croplands\n"
presentation_instructions: 'Clarify that "natural/semi-natural grassland" includes grasslands, shrublands, and savannas —
  any low vegetation (<3m) with at least 30% cover. MUST include this caveat when discussing grassland gains: "Gains do not
  necessarily represent ecological restoration — they may reflect land abandonment, invasive species expansion, woody encroachment,
  or temporary regrowth." Losses should not be described as "permanent conversion" without qualification. For cultivated grasslands
  or croplands, direct users to the Global Land Cover dataset.

  '
description: "Annual 30 m maps of global natural/semi-natural grassland extent from 2000 to 2022. This dataset defines grasslands\
  \ very broadly such that they encompass grasslands, shrublands, and savannas by including any land cover type which contains\
  \ at least 30% of dry or wet low vegetation, dominated by grasses and forbs (less than 3 meters) and a:\n  maximum of 50%\
  \ tree canopy cover (greater than 5 meters),\n  maximum of 70% of other woody vegetation (scrubs and open shrubland), and\n\
  \  maximum of 50% active cropland cover in mosaic landscapes of cropland & other vegetation.\nNatural/semi-natural grassland:\
  \ Relatively undisturbed native grasslands/short-height vegetation, such as steppes and tundra, as well as areas that have\
  \ experienced varying degrees of human activity in the past, which may contain a mix of native and introduced species due\
  \ to historical land use and natural processes. In general, they exhibit natural-looking patterns of varied vegetation and\
  \ clearly ordered hydrological relationships throughout the landscape.\n"
methodology: 'The dataset showing the spatiotemporal distribution of natural/semi-natural grassland classes was produced by
  using GLAD Landsat ARD-2 image archive, accompanied by climatic, landform and proximity covariates, spatiotemporal machine
  learning (per-class Random Forest) and over 2.3 M reference samples (visually interpreted in Very High Resolution imagery).
  Custom probability thresholds (based on five-fold spatial cross-validation) were used to derive dominant class maps with
  balanced user''s and producer''s accuracy, resulting in f1 score of 0.75 for natural/semi-natural grassland.

  '
cautions: "Despite the flexibility provided by the probability maps, we note several classification issues and limitation\
  \ in our natural/semi-natural grassland predictions (see Table 6). Most of these issues (e.g. specially the miss-classification\
  \ errors) are not trivial to resolve in the face of Random Forest as a complex and non-linear prediction system, as we are\
  \ not sure these outcomes happen because of (1) extrapolation problems, (2) noise/limited detectability in the Landsat images,\
  \ (3) fuzzy definition of grassland classes, (4) need of more specialized and regional/local ML models, or (5) simply a\
  \ lack of training points in these areas. It appears that intensively managed grasslands, with high homogeneity under many\
  \ conditions, have a high chance of being confused with other classes that have very similar spectral properties, such as\
  \ urban mosaics (i.e. buildings, sparse trees and grass fields with different densities) or (greenish) croplands with similar\
  \ vegetation height and spatial configuration (such as cereal crops). Less intensively cultivated grasslands, where more\
  \ diverse plant species can be found and where the landscape may not be very regular, are easily confused with grasslands\
  \ that are not cultivated or (semi) natural herbaceous vegetation, in general. In addition, the spectral signal of cultivated\
  \ grasslands can not be as clearly distinguished from natural/semi-natural grassland as it could be from croplands, where\
  \ there are clear breaks in vegetation growth in cases where multi-temporal clear-sky images are available. The distinction\
  \ between cultivated and natural/semi-natural grasslands has been notoriously difficult to map in the past, which has also\
  \ affected our reference data collection and harmonization process. Hence, our reference labeling protocol relied on more\
  \ indirect indicators of management, such as fences and other typical infrastructure, hay bales, machine presence, and even\
  \ animal presence in the field or geometric shapes of the landscape. This may lead to an underestimation of signs of cultivation\
  \ that may be less intensive or where VHR imagery was not available at the time of management practices. Under-estimation\
  \ of grassland extent\n  Grassland extent is under-predicted in southeastern Africa (mainly in Zimbabwe and Mozambique)\n\
  \  and in eastern Australia (mainly in the shrublands and woodlands of the Mulga ecoregion).\nCropland misclassified as\
  \ grassland\n  In the state of Montana, USA, cropland areas located on historical prairie areas have high\n  probability\
  \ values for natural/semi-natural grassland and low values for cultivated grassland.\n  Sudan, Niger, Uganda, Kenya, and\
  \ Mali have several cropland areas with high probability\n  values for natural/semi-natural grassland.\nMixed farmland mosaics\
  \ misclassified as grassland\n  Farmland mosaics in North-Eastern Uganda's present high probability for both grassland classes,\n\
  Macroscopic errors\n  Although important for grassland separation, the 1-km accessibility maps and MODIS products\n  (MOD11A2\
  \ and MCD19A2) introduced curvilinear macroscopic errors (due to the downscaling\n  strategy based on cubicspline) in Uruguay,\
  \ Southwest Argentina, South of Angola and in\n  Sahel region in Africa.\n  Due to the Landsat 7 Scan Line Corrector failure,\
  \ regular stripes of grassland probabilities\n  are visible at parcel-level. This issue is more prominent in 2012, where\
  \ GLAD Landsat ARD-2\n  relies only in Landsat 7 imagery.\nSpectral overlap between natural and cultivated grasslands (especially\
  \ fallow fields or lightly grazed areas) can result in misclassification. Regional differences in management practices may\
  \ not be detectable in global models. Data likely reflects a snapshot per year, not intra-annual dynamics or land use rotations\
  \ (e.g. grazing/fallow cycles). Definitions of \"natural\", \"semi-natural\", and \"cultivated\" vary by region and culture;\
  \ users should not assume the dataset reflects legal or ecological classifications in every context. Short-term disturbances\
  \ (fire, grazing, flood) might be:\n  1. Misclassified as change\n  2. Undetected if recovery is rapid\n  3. Dataset may\
  \ not represent functional health of grasslands (e.g. degradation, productivity loss).\nIt's important to understand that\
  \ while natural / semi-natural grassland areas can and do support grazing by wild ruminants and domestic livestock, these\
  \ areas can still retain significant ecological value. These ecosystems continue to provide carbon storage, biodiversity\
  \ habitat, and ecosystem services such as water regulation, pollination, and soil stabilization. However, once lost to cropland\
  \ or pasture (through intensive management actions such as plowing or planting), or built areas (e.g. cities or energy infrastructure),\
  \ or are seriously degraded (e.g. become bare ground) many of those benefits are lost or severely diminished. Very long\
  \ crop rotations or shifting cultivation systems may be captured in our analysis as loss events. While these land use changes\
  \ may be temporary or part of cyclical agricultural practices, they can resemble permanent conversion in satellite-based\
  \ land cover datasets, particularly when vegetation structure changes significantly or persists across multiple years. Many\
  \ forms of degradation, such as declines in plant diversity, aboveground productivity, soil health, or subtle structural\
  \ changes, may not result in a detectable land cover change and are therefore not reflected as Natural / semi-natural grassland\
  \ loss. Not all gross gains detected in natural / semi-natural grassland areas reflect deliberate or ecologically desirable\
  \ restoration. Some observed transitions may result from land abandonment rather than active restoration, and in some cases\
  \ regrowth may be dominated by invasive species or woody plant encroachment. Further, long fallow periods within rotational\
  \ or shifting agricultural systems may be misclassified as gains when in fact they are part of a temporary cycle.  Some\
  \ gains may reflect early successful stages or temporary states rather than mature, functioning, and recovered ecosystems.\
  \ Area estimates for this analysis were derived using pixel counting, which involves summing the number of 30-m pixels classified\
  \ as natural/semi-natural grasslands and converting this count to an area estimate. However, pixel counting is not best\
  \ practice for area estimation., as it does not account for classification uncertainties or biases.\n"
function_usage_notes: 'This global grasslands dataset is intended to be used for monitoring natural/semi-natural grasslands
  in individual years as well as change over time. This dataset should be used when a user asks about area in a specific year
  or gain or loss of area between years for natural/semi-natural grasslands. This dataset may NOT be overlaid with DIST alert
  data to find alerts in natural/semi-natural grasslands. It can be used to find where natural/semi-natural grasslands were
  in 2020 and then see how they have changed since then.

  Any questions about snapshot or baseline natural/semi-natural in a given year, any questions about change over time in natural/semi-natural
  grasslands in a single time step or trends over the full time period. Any questions about spatial patterns of change in
  a given geography, any questions about hotspots and outlier detection. Any questions about the accuracy of the data (validation)
  or the cross-dataset consistence with ESA World Cover, UMD LC etc.

  This data should not be used for questions about cultivated grasslands, croplands, or open shrublands. We suggest guiding
  the LLM to use Global Pasture Watch data for any prompts specific to natural and semi-natural grasslands and to use the
  harmonized UMD LC data for any questions regarding cultivated, improved, or planted pasture, short vegetation, and croplands.

  '
