  Global Maps of 21st-Century Forest Cover Change." Science 342 (15 November): 850-53. [doi:10.1126/science.1244693](https://doi.org/10.1126/science.1244693).
  Data available from: [Global Forest Change](https://glad.earthengine.app/view/global-forest-change).

  '
