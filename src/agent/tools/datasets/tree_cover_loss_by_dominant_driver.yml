dataset_id: 8
dataset_name: Tree cover loss by dominant driver
variables: null
tile_url: https://tiles.globalforestwatch.org/wri_google_tree_cover_loss_drivers/v1.12/dynamic/{z}/{x}/{y}.png?tree_cover_density_threshold=30&render_type=true_color
license: CC by 4.0
geographic_coverage: Global
resolution: 0.01 x 0.01 degree (approximately 1 km at the equator)
update_frequency: annual
content_date: 2001-2024
start_date: '2001-01-01'
end_date: '2024-12-31'
content_date_fixed: true
keywords:
- deforestation
- forest loss
- driver
- agriculture
- commodities
- shifting cultivation
- logging
- wildfire
- infrastructure
- settlements
analytics_api_endpoint: /v0/land_change/tree_cover_loss/analytics
analytics_config:
  date_params:
    type: year
    start_key: start_year
    end_key: end_year
  params:
    canopy_cover:
      values: [10, 15, 20, 25, 30, 50, 75]
      default: 30
      description: Minimum percent canopy cover. Carbon model only valid for 30% or greater.
    forest_filter:
      values: [primary_forest, natural_forest]
      default: null
      description: Filter to primary forest or natural forest
    intersections:
      type: list
      values: [driver]
      default: [driver]
      description: Driver context layer (always active for this dataset)
tile_url_config:
  type: none
prompt_instructions: "Shows the delta of the primary driver or cause of tree cover loss over the entire range 2001-2024. The\
  \ data represents the change for the whole period of time, not a timeseries. IMPORTANT: If a user asks for specific time\
  \ ranges (e.g. last five years), single years (e.g. 2024), or trends over time, do not use this dataset, select Tree cover\
  \ loss instead. Classes are defined as follows: - Permanent agriculture: Long-term, permanent tree cover loss for small-\
  \ to large-scale agriculture. - Hard commodities: Loss due to the establishment or expansion of mining or energy infrastructure.\
  \ - Shifting cultivation: Tree cover loss due to small- to medium-scale clearing for temporary\n  cultivation that is later\
  \ abandoned and followed by subsequent regrowth of secondary forest or\n  vegetation.\n- Logging: Forest management and\
  \ logging activities occurring within managed, natural or\n  semi-natural forests and plantations, often with evidence of\
  \ forest regrowth or planting in\n  subsequent years.\n- Wildfire: Tree cover loss due to fire with no visible human conversion\
  \ or agricultural\n  activity afterward. Fires may be started by natural causes (e.g. lightning) or may be\n  related to\
  \ human activities (accidental or deliberate).\n- Settlements and infrastructure: Tree cover loss due to expansion and intensification\
  \ of roads,\n  settlements, urban areas, or built infrastructure (not associated with other classes).\n  Other natural disturbances:\
  \ Tree cover loss due to other non-fire natural disturbances\n  (e.g., landslides, insect outbreaks, river meandering).\
  \ If loss due to natural causes is\n  followed by salvage or sanitation logging, it is classified as logging.\nDO NOT include\
  \ the 'Unknown' class in analysis. Show total area of loss (ha) or total emissions (MgCO2e) due to loss per driver class\
  \ over the entire time period 2001-2024. Data should be represented in a pie chart or table with each segment representing\
  \ loss area or emissions due per driver class. DO NOT use the term \"deforestation\", use \"tree cover loss\" instead since\
  \ \"Tree cover\" includes plantations as well as natural forest meaning loss is not automatically deforestation or carbon\
  \ loss. Common groupings of classes that can be mentioned where relevant: - Permanent agriculture, hard commodities, and\
  \ settlements and infrastructure can be combined\n  to represent drivers of deforestation.\n- Shifting cultivation, logging,\
  \ wildfire, and other natural disturbances can be combined\n  to represent drivers of temporary disturbances.\n- Permanent\
  \ agriculture and shifting cultivation can be combined to represent all\n  agriculture-driven disturbances.\n"
selection_hints: 'Use when user asks WHY tree cover was lost — attributes loss to 7 driver classes. Shows dominant driver
  per 1km cell over entire period 2001-2024 (NOT annual). Cannot produce timeseries or data for specific dates or years. For
  for annual loss trends, use "Tree cover loss" dataset. Resolution is ~1km (coarser than 30m TCL) — not suitable for local/parcel
  analysis. Drivers: permanent agriculture, hard commodities, shifting cultivation, logging, wildfire, settlements & infrastructure,
  other natural disturbances.

  '
code_instructions: "CHART TYPES: - Driver breakdown → pie chart or table ONLY - DO NOT attempt a timeseries — this is a single-period\
  \ aggregate (2001-2024) DATA RULES: - Exclude the \"Unknown\" driver class from analysis - Show area_ha or emissions (MgCO2e)\
  \ per driver class for the full period 2001-2024 - 7 driver classes:\n  1. Permanent agriculture — long-term, permanent\
  \ tree cover loss for agriculture\n  2. Hard commodities — loss due to mining or energy infrastructure\n  3. Shifting cultivation\
  \ — small/medium-scale temporary cultivation, later abandoned\n  4. Logging — forest management within managed/natural/semi-natural\
  \ forests and plantations\n  5. Wildfire — fire with no visible human conversion afterward\n  6. Settlements and infrastructure\
  \ — roads, urban areas, built infrastructure\n  7. Other natural disturbances — non-fire natural disturbances (landslides,\
  \ insects, rivers)\nDO/DON'T: - DO NOT use \"deforestation\" — use \"tree cover loss\" - If user asks for annual timeseries,\
  \ REFUSE and suggest base \"Tree cover loss\" dataset - Common groupings to apply where relevant:\n  Deforestation proxy:\
  \ permanent agriculture + hard commodities + settlements & infrastructure\n  Temporary disturbance: shifting cultivation\
  \ + logging + wildfire + other natural disturbances\n  All agriculture: permanent agriculture + shifting cultivation\n"
presentation_instructions: 'Use "tree cover loss" not "deforestation." Driver = dominant driver in each ~1km cell over full
  period 2001-2024, not per-event attribution. Does not distinguish natural forest from plantations. Classification is an
  approximation — does not monitor regrowth or permanence.

  '
description: "Shows the dominant driver of tree cover loss over the time period 2001-2024. A driver is defined as the direct\
  \ cause of tree cover loss, and can include both temporary disturbances (natural or anthropogenic) or permanent loss of\
  \ tree cover due to a change to a non-forest land use (e.g., deforestation).  The dominant driver is defined as the direct\
  \ driver that caused the majority of tree cover loss within each 1 km cell over the time period. Classes are defined as\
  \ follows: - Permanent agriculture: Long-term, permanent tree cover loss for small- tolarge-scale agriculture. - Hard commodities:\
  \ Loss due to the establishment or expansion of mining or energy infrastructure. - Shifting cultivation: Tree cover loss\
  \ due to small- to medium-scale clearing for temporary\n  cultivation that is later abandoned and followed by subsequent\
  \ regrowth of secondary forest or\n  vegetation.\n- Logging: Forest management and logging activities occurring within managed,\
  \ natural or\n  semi-natural forests and plantations, often with evidence of forest regrowth or planting in\n  subsequent\
  \ years.\n- Wildfire: Tree cover loss due to fire with no visible human conversion or agricultural\n  activity afterward.\
  \ Fires may be started by natural causes (e.g. lightning) or may be\n  related to human activities (accidental or deliberate).\n\
  - Settlements and infrastructure: Tree cover loss due to expansion and intensification of roads,\n  settlements, urban areas,\
  \ or built infrastructure (not associated with other classes).\n  Other natural disturbances: Tree cover loss due to other\
  \ non-fire natural disturbances\n  (e.g., landslides, insect outbreaks, river meandering). If loss due to natural causes\
  \ is\n  followed by salvage or sanitation logging, it is classified as logging.\n"
methodology: 'These data were produced in a collaboration between the World Resources Institute and Google DeepMind. The data
  were developed using a global neural network model (ResNet) trained on a set of samples collected through visual interpretation
  of very high-resolution satellite imagery. The model used satellite imagery (Landsat 7 & 8, Sentinel-2) and ancillary data
  to classify the seven driver categories. Overall accuracy of the model is 90.5%, with regional accuracies varying from 82.8%
  in Southeast Asia to 94.1% in Asia. Global per class producer''s and user''s accuracy are highest for the permanent agriculture,
  logging, and wildfire classes (over 90%), and generally lower for rarer classes, such as hard commodities, settlements and
  infrastructure, and other natural disturbances. A full description of the methods and accuracy statistics are available
  in the publication. The data is also available on [Google Earth Engine](https://developers.google.com/earth-engine/datasets/catalog/projects_landandcarbon_assets_wri_gdm_drivers_forest_loss_1km_v1_2_2001_2024)

  '
cautions: 'The grouping of drivers into deforestation and temporary disturbances (i.e., likely followed by regrowth) is indicative
  of how these classes are defined in the data and should be considered an approximation. This product does not monitor regrowth
  or permanence of loss following each loss event. This product does not distinguish between the loss of natural forest and
  planted trees (e.g., plantations, tree crops, or agroforestry systems). While tree cover loss associated with the permanent
  agriculture, hard commodities, and settlements & infrastructure classes represent a close approximation of deforestation,
  they do not always represent the conversion of natural forests to other land uses and in some cases may represent loss of
  planted trees. Similarly, replacement of natural forest with wood fiber plantations is not distinguished from routine harvesting
  within existing plantations established before 2000, as these are both included in the logging class. These data are limited
  in scope to attributing drivers to tree cover loss as mapped by the Hansen et al. 2013 tree cover loss product, and therefore
  the detection of loss is subject to the accuracy of that product. This product shows the dominant driver in each 1 km cell
  over the entire period. It does not show multiple drivers if they occur in the same cell at smaller scales, nor does it
  detail the sequence of drivers if multiple occurred at different times within the period. A full description of limitations
  is included in the publication.

  '
function_usage_notes: 'Identifies areas of gross tree cover loss

  '
providers: 'Sims, M.J., R. Stanimirova, A. Raichuk, M. Neumann, J. Richter, F. Follett, J. MacCarthy, K. Lister, C. Randle,
