prompt_instructions: 'This dataset provides statistical land use change (sLUC) emission factors, total emissions, and production
  volume for 42 agricultural crops across multiple spatial scales: national (ADM0), subnational (ADM1),and local administrative
  units (ADM2). Emission factors quantify total greenhouse gas emissions in tCO2e per tonne of product from deforestation
  linked to agricultural expansion. Not all crops are available for all regions. Emissions can be reported by specific gas
  types: CO2, CH4, N2O; or the total greenhouse gas emissions (tCO2e). Data available between 2020-2024, use 2024 as the default
  year unless otherwise specified. In the data, emissions_tCO2e stands for linearly discounted emissions, emissions_factor_tCO2e_per_tonne_production
  stands for emission factors, and production_tonnes for crop production or production volume. When referencing emissions,
  always include units (tCO₂e). When referencing production volume, always include units (tonnes). If asked for a map, refuse
  and explain that this is tabular data only. When providing emission factors, always clarify the year of reporting (2020-2024)
  and show the both total emissions and production volume used to calculate the emission factor. DO NOT show combinations
  of EF, total emissions, and production volume together on a bar chart. Use pie charts to show proportional contributions
  of total emissions by gas type (CO2, CH4, N2O) for a specific crop and yearm in a single administrative unit. Use bar charts
  to show changes in emissions factor, total emissions, or production volume over time for a specific crop in a single administrative
  unit. Use tables to show emission factors for multiple crops in a single administrative unit or for a single crop across
  multiple administrative units. Use tables to compare a single crop across multiple locations. Use tables summarise emissions
  factors, total emissions, and production volume.

  '
selection_hints: 'Provides sLUC (statistical land use change) emission factors for 42 agricultural crops. Quantifies GHG emissions
  (tCO2e) per tonne of crop product from deforestation-linked agricultural expansion. Available at ADM0, ADM1, ADM2 levels,
  2020-2024. Use when user asks about crop-specific deforestation emissions or emission factors. Tabular data only — no spatial/map
  output possible. Not all crops available in all regions.

  '
code_instructions: "CHART TYPES: - Proportional emissions by gas type (CO2, CH4, N2O) → pie chart\n  (single crop, single\
  \ year, single admin unit)\n- Changes in EF, emissions, or production over time → bar chart\n  (single crop, single admin\
  \ unit)\n- Multiple crops in one location or one crop across locations → table - Summary of EF + emissions + production\
  \ → table DATA RULES: - Default year = 2024 unless user specifies otherwise - Column names: emissions_tCO2e (total emissions),\
  \ emissions_factor_tCO2e_per_tonne_production\n  (emission factor), production_tonnes (production volume)\n- MUST include\
  \ units in all output: tCO2e for emissions, tonnes for production DO/DON'T: - DO NOT combine EF + total emissions + production\
  \ volume on the same bar chart - If user asks for a map or spatial visualization: REFUSE — this dataset is tabular\n  only,\
  \ no spatial output is possible. Suggest Tree Cover Loss or DIST alerts for\n  spatial analysis of deforestation impacts.\n\
  - When showing emission factors, also show total emissions and production volume\n  used to calculate them\n- Always clarify\
  \ the reporting year (2020-2024)\n"
presentation_instructions: 'Always include units: tCO2e for emissions, tonnes for production volume. Note: tCO2e = MgCO2e
  (metric tonnes of CO2 equivalent). Clarify the reporting year (default 2024). Note that emission factors quantify emissions
  from deforestation linked to agricultural expansion, not all land use emissions. Not all crops are available for all regions.
  This is tabular data only — no map visualization is possible.

  '
description: 'The dataset developed by Fitts et al. (2025) provides globally consistent, spatially explicit estimates of statistical
  land use change (sLUC) emission factors for 42 agricultural crops across multiple spatial scales-global, national (ADM0),
  subnational (ADM1),and local administrative units (ADM2). Emission factors quantify greenhouse gas emissions from deforestation
  linked to agricultural expansion over a 20-year assessment period (2001-2020), aligning with the first full time span of
  Global Forest Watch''s annual tree cover loss and forest carbon flux data.  Emission factors are available for reporting
  years 2020 through 2024 and we expect to update the dataset annually as new tree cover loss and emissions data become available.
  The dataset integrates several harmonized, open-source geospatial inputs: the SPAM 2020 v2.0 cropland maps (10 km resolution)
  for crop distribution and production; Global Forest Watch''s tree cover loss (Hansen et al. 2013, annual updates); the forest
  carbon flux model (Harris et al. 2021; Gibbs et al. 2025) for estimating deforestation-related emissions; Global Pasture
  Watch (Parente et al. 2024) for pasture extent; and the drivers of forest loss (Sims et al. 2025) to isolate agriculture-driven
  deforestation.

  '
methodology: 'Fitts et al. (2025) developed a standardized, transparent, and globally consistent approach for estimating land
  use change (LUC) emissions, focusing on statistical land use change (sLUC) emission factors. The method integrates publicly
  available geospatial datasets-including SPAM 2020 cropland data, Global Forest Watch''s tree cover loss and carbon flux
  models, and Global Pasture Watch-to quantify deforestation-related greenhouse gas emissions associated with agricultural
  expansion. Using a 20-year assessment period, the approach identifies forest-to-agriculture conversions, estimates annual
  emissions, allocates them to crops via a product expansion allocation factor, and applies linear discounting to weight recent
  emissions more heavily. Emissions are then normalized by crop production (from SPAM and FAOSTAT) to yield crop- and jurisdiction-specific
  sLUC emission factors (tCO₂e per tonne of crop commodity), enabling consistent corporate greenhouse gas accounting across
  spatial scales.

  '
cautions: "Users should be aware of several limitations when utilizing the sLUC emission factors: - Data Resolution: The underlying\
  \ geospatial datasets vary in resolution, which may affect\n  accuracy at finer spatial scales, particularly for small administrative\
  \ units (ADM2).\n- Crop Coverage: Not all 42 crops are available for every region due to data constraints,\n  potentially\
  \ limiting comprehensive assessments in certain areas.\n- Temporal Alignment: While the assessment period is 2001-2020,\
  \ emission factors are reported\n  for 2020-2024, which may introduce discrepancies if land use dynamics have shifted significantly.\n\
  - Methodological Assumptions: The linear discounting approach assumes a uniform decay of emissions\n  relevance over time,\
  \ which may not capture complex land use change dynamics.\nUsers are encouraged to review the full methodology and associated\
  \ publications to understand these limitations and ensure appropriate application of the data in their specific contexts.\n"
