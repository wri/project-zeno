name: WRI Insights Data Snapshot

# Fetches the WRI Insights blog corpus, builds the sgrep index, and publishes
# both as a data image. The app Dockerfile copies /data out of this image, so
# refreshing content = run this workflow, then rebuild/redeploy the app image.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC

env:
  REGISTRY: public.ecr.aws/b7u8b0a6
  IMAGE_NAME: project-zeno/wri-insights-data

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Seed from previous snapshot
        # Reuse the last snapshot so the lastmod-based sync only fetches new
        # or changed articles instead of re-scraping all of wri.org. The pull
        # fails on the very first run, which then does a full fetch.
        run: |
          mkdir -p data
          if docker pull "$REGISTRY/$IMAGE_NAME:latest"; then
            id=$(docker create "$REGISTRY/$IMAGE_NAME:latest" noop)
            docker cp "$id":/data/. data/
            docker rm "$id"
            echo "Seeded from previous snapshot."
          else
            echo "No previous snapshot found; doing a full fetch."
          fi

      - name: Fetch articles
        run: uv run python scripts/fetch_wri_insights.py --workers 4

      - name: Build sgrep index
        run: uv run python -m src.agent.utils.sgrep index

      - name: Sanity-check snapshot
        run: |
          uv run python -c "
          import sys
          from src.agent.utils.sgrep import data_status
          ok, detail = data_status(min_articles=2000)
          print(detail)
          sys.exit(0 if ok else 1)
          "

      - name: Build and push data image
        # Build from a staging dir rather than the repo root: the repo's
        # .dockerignore excludes data/*, which would empty the image.
        run: |
          mkdir -p snapshot-context
          cp -r data/wri_insights data/wri_insights_index snapshot-context/
          cat > snapshot-context/Dockerfile <<'EOF'
          FROM scratch
          COPY wri_insights /data/wri_insights
          COPY wri_insights_index /data/wri_insights_index
          EOF
          DATE_TAG=$(date -u +%Y.%m.%d)
          docker build \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:$DATE_TAG" \
            snapshot-context
          docker push "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:$DATE_TAG"
