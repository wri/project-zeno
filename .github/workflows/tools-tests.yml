name: Tools Tests

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, reopened, labeled, unlabeled]

concurrency:
  group: tools-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-tools-tests')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zeno-data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zeno-data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tools tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/zeno-data
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/zeno-data
          # Replay AOI SQL results from fixtures (no geometries_gadm / PostGIS load in CI).
          AOI_PICK_AOI_FIXTURES_MODE: replay
          AOI_PICK_AOI_FIXTURES_PATH: tests/fixtures/aoi_pick_aoi_v1.json
          DOMAINS_ALLOWLIST: developmentseed.org,wri.org
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MODEL: gemini-flash
          SMALL_MODEL: gemini-flash
          CODING_MODEL: gemini-3-flash-preview
          MAPBOX_API_TOKEN: ${{ secrets.MAPBOX_API_TOKEN }}
          WRI_API_KEY: ${{ secrets.WRI_API_KEY }}
          WRI_BEARER_TOKEN: ${{ secrets.WRI_BEARER_TOKEN }}
          GFW_DATA_API_KEY: ${{ secrets.GFW_DATA_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          API_BASE_URL: http://localhost:8000
          LOCAL_API_BASE_URL: http://localhost:8000
          STREAMLIT_URL: http://localhost:8501
          COOKIE_SIGNER_SECRET_KEY: fake-cookie-key
          NEXTJS_API_KEY: test-nextjs-api-key
          EOAPI_BASE_URL: https://eoapi.globalnaturewatch.org
        run: |
          mkdir -p data
          uv run python src/ingest/embed_datasets.py
          uv run pytest tests/tools -v
